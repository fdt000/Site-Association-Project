<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="../css/style.css">

        </section>

        <div class="separate" data-img="css/img/icon-galerie-bohomme1.svg"></div>

        <section class="contact-address">
            <div class="contact-address-title">
                <h2>C'est par ici</h2>
                <img src="#" alt="flèche qui point vers la carte">
                <h2>Galerie des Marins</h2>
                <p>4 bis Rue du Chatelet
                    22750- Saint-Jacut-de-la-mer</p>
            </div>
            <div class="contact-address-map">
                <iframe class="map-google"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2638.6404974916773!2d-2.193007558622653!3d48.59758197141734!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x480e7bbff07eb94f%3A0xe1e5d467a9145e45!2s4%20Bis%20Rue%20du%20Ch%C3%A2telet%2C%2022750%20Saint-Jacut-de-la-Mer!5e0!3m2!1sen!2sfr!4v1776167744943!5m2!1sen!2sfr"></iframe>

                <iframe

                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

</main>
