<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body class="contact">
    <header>
        <div id="header"></div>
    </header>

    <main>
        <!-- CONTACT -->
        <section class="contact-content">
            <div class="contact-content-card-hour">
                <div id="contact-cardHour" class="card-hour"></div>
            </div>
            <div class="contact-content-img-container">
                <img class="contact-content-img" src="/css/img/bonhomme-phone.svg"
                    alt="icon bohomme galerie des marins téléphone">
            </div>

            <div class="contact-content-title">
                <h2>Contactez-nous</h2>
            </div>
        </section>

        <div class="separate" data-img="/css/img/bohomme-logo.svg" data-variant="contate"></div>

        <!-- MAPS -->
        <section class="contact-address">
            <div class="contact-address-title"> <!--BLOC TEXTE-->
                <span class="contact-address-title-1">
                    <h2>C'est par ici</h2>
                </span>
                <span class="contact-address-title-arrow">
                    <img class="contact-address-title-arrow-img" src="/css/img/icon/icon-arow.png"
                        alt="icon flèche qui point vers la carte">
                </span>
                <span class="contact-address-title-2">
                    <h2>Galerie des Marins</h2>
                </span>
                <span class="contact-address-title-adresse">
                    <p>4 bis Rue du Chatelet
                        22750- Saint-Jacut-de-la-mer</p>
                </span>
            </div>

            <div class="contact-address-map">
                <iframe class="map-google"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2638.6404974916773!2d-2.193007558622653!3d48.59758197141734!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x480e7bbff07eb94f%3A0xe1e5d467a9145e45!2s4%20Bis%20Rue%20du%20Ch%C3%A2telet%2C%2022750%20Saint-Jacut-de-la-Mer!5e0!3m2!1sen!2sfr!4v1776167744943!5m2!1sen!2sfr"></iframe>
            </div>
        </section>
    </main>

    <footer>
        <div id="footer"></div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</main>

</html>
